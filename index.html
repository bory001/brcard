<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>폰트 테스트 v3</title>
<style>
body{font-family:sans-serif;padding:20px;}
#log{background:#f0f0f0;padding:12px;border-radius:8px;margin-top:10px;font-size:13px;line-height:1.8;white-space:pre-wrap;}
.ok{color:green;} .err{color:red;font-weight:bold;}
canvas{border:1px solid #ccc;display:block;margin-top:10px;}
</style>
</head>
<body>
<h3>폰트 로드 테스트 v3</h3>
<input type="file" id="fontFile" accept=".ttf,.otf,.ttc">
<canvas id="c" width="600" height="220"></canvas>
<div id="log">파일을 선택해주세요...</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const log=document.getElementById('log');
let step=0;

function ok(msg){log.innerHTML+='<span class="ok">✓ ['+step+'] '+msg+'</span>\n';step++;}
function err(msg){log.innerHTML+='<span class="err">✗ ['+step+'] 오류: '+msg+'</span>\n';step++;}
function info(msg){log.innerHTML+='  '+msg+'\n';}

function bufToBase64(buf){
  const view=new Uint8Array(buf);
  let bin='';
  for(let i=0;i<view.length;i+=8192)
    bin+=String.fromCharCode(...view.subarray(i,Math.min(i+8192,view.length)));
  return btoa(bin);
}

document.getElementById('fontFile').addEventListener('change',async function(e){
  step=0;log.innerHTML='';
  const file=e.target.files[0];
  if(!file)return;
  info('파일: '+file.name+' ('+Math.round(file.size/1024)+'KB)');

  // Step 1: ArrayBuffer 읽기
  let buf;
  try{buf=await file.arrayBuffer();ok('ArrayBuffer 읽기');}
  catch(e){err('ArrayBuffer: '+e.message);return;}

  // Step 2: Base64 변환
  let base64;
  try{base64=bufToBase64(buf);ok('Base64 변환 ('+base64.length+'자)');}
  catch(e){err('Base64: '+e.message);return;}

  const name=file.name.replace(/\.(ttf|otf|ttc)$/i,'');
  info('폰트명: "'+name+'"');

  // Step 3: CSS @font-face
  try{
    const s=document.createElement('style');
    s.textContent='@font-face{font-family:"'+name+'";src:url("data:font/opentype;base64,'+base64+'")}';
    document.head.appendChild(s);
    ok('CSS @font-face 주입');
  }catch(e){err('CSS: '+e.message);return;}

  // Step 4: FontFace API
  try{
    const face=new FontFace(name,buf.slice(0));
    const loaded=await face.load();
    document.fonts.add(loaded);
    ok('FontFace API 등록 (status: '+loaded.status+')');
  }catch(e){err('FontFace: '+e.message);}

  // Step 5: DOM 렌더링
  try{
    const div=document.createElement('span');
    div.style.cssText='font-family:"'+name+'";position:fixed;left:-9999px;font-size:20px;';
    div.textContent='가나다ABC';
    document.body.appendChild(div);
    div.getBoundingClientRect();
    await new Promise(r=>setTimeout(r,500));
    document.body.removeChild(div);
    ok('DOM 렌더링 강제');
  }catch(e){err('DOM: '+e.message);}

  // Step 6: fonts.ready
  try{
    await document.fonts.ready;
    const checked=document.fonts.check('20px "'+name+'"');
    ok('fonts.ready 완료 / check='+checked);
  }catch(e){err('fonts.ready: '+e.message);}

  // Step 7: 캔버스 렌더링
  try{
    ctx.clearRect(0,0,600,220);
    ctx.fillStyle='#fff';ctx.fillRect(0,0,600,220);

    ctx.fillStyle='#999';ctx.font='18px sans-serif';
    ctx.fillText('기본폰트: 가나다 ABC 123',10,28);

    ctx.fillStyle='#000';
    ctx.font='18px "'+name+'"';
    ctx.fillText(name+' 18px: 가나다 ABC',10,65);

    ctx.font='28px "'+name+'"';
    ctx.fillText('28px: 가나다 ABC',10,110);

    ctx.font='42px "'+name+'"';
    ctx.fillText('42px: 가나다',10,170);

    ok('캔버스 렌더링 완료');
  }catch(e){err('캔버스: '+e.message);}

  // Step 8: 1초 후 재시도
  setTimeout(()=>{
    ctx.clearRect(0,0,600,220);
    ctx.fillStyle='#fff';ctx.fillRect(0,0,600,220);
    ctx.fillStyle='#999';ctx.font='18px sans-serif';
    ctx.fillText('기본폰트: 가나다 ABC 123',10,28);
    ctx.fillStyle='#000';
    ctx.font='18px "'+name+'"';
    ctx.fillText('[1초후] '+name+': 가나다 ABC',10,65);
    ctx.font='42px "'+name+'"';
    ctx.fillText('42px: 가나다',10,130);
    info('→ 1초 후 재렌더링 완료');
  },1000);
});
</script>
</body>
</html>
