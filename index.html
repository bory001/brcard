<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>폰트 테스트 v2</title>
</head>
<body>
<h3>폰트 로드 테스트 v2</h3>
<input type="file" id="fontFile" accept=".ttf,.otf,.ttc">
<br><br>
<canvas id="c" width="600" height="220" style="border:1px solid #ccc;background:#fff;"></canvas>
<div id="log" style="font-family:monospace;font-size:12px;margin-top:10px;white-space:pre;"></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const log = document.getElementById('log');

function addLog(msg) { log.textContent += msg + '\n'; }

function bufToBase64(buf) {
  const view = new Uint8Array(buf);
  let bin = '';
  const chunk = 8192;
  for (let i = 0; i < view.length; i += chunk) {
    bin += String.fromCharCode(...view.subarray(i, i + chunk));
  }
  return btoa(bin);
}

function drawTest(fontName) {
  ctx.clearRect(0, 0, 600, 220);
  ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, 600, 220);
  ctx.fillStyle = '#aaa'; ctx.font = '20px sans-serif';
  ctx.fillText('기본폰트: 가나다 ABC', 10, 30);
  ctx.fillStyle = '#000';
  ctx.font = '20px "' + fontName + '"';
  ctx.fillText(fontName + ' 20px: 가나다 ABC', 10, 70);
  ctx.font = '32px "' + fontName + '"';
  ctx.fillText('32px: 가나다 ABC', 10, 120);
  ctx.font = '48px "' + fontName + '"';
  ctx.fillText('48px: 가나다', 10, 185);
}

document.getElementById('fontFile').addEventListener('change', async function(e) {
  const file = e.target.files[0];
  if (!file) return;
  log.textContent = '';
  const fontName = file.name.replace(/\.(ttf|otf|ttc)$/i, '');
  addLog('파일: ' + file.name);
  addLog('폰트명: ' + fontName);
  addLog('파일크기: ' + (file.size/1024).toFixed(1) + 'KB');
  try {
    const buf = await file.arrayBuffer();
    addLog('ArrayBuffer OK');
    const base64 = bufToBase64(buf);
    addLog('Base64 OK: ' + base64.length + ' chars');

    const style = document.createElement('style');
    style.textContent = '@font-face { font-family: "' + fontName + '"; src: url("data:font/opentype;base64,' + base64 + '"); }';
    document.head.appendChild(style);
    addLog('CSS @font-face OK');

    const face = new FontFace(fontName, buf.slice(0));
    const loaded = await face.load();
    document.fonts.add(loaded);
    addLog('FontFace OK, status: ' + loaded.status);

    const div = document.createElement('div');
    div.style.cssText = 'font-family:"' + fontName + '";position:fixed;left:-9999px;top:0;font-size:20px;';
    div.textContent = '가나다ABC';
    document.body.appendChild(div);
    div.getBoundingClientRect();
    await new Promise(r => setTimeout(r, 300));
    document.body.removeChild(div);
    await document.fonts.ready;
    addLog('fonts.ready OK');
    addLog('fonts.check: ' + document.fonts.check('20px "' + fontName + '"'));

    drawTest(fontName);
    addLog('캔버스 렌더링 완료');
    setTimeout(() => { drawTest(fontName); addLog('1초후 재렌더링'); }, 1000);
  } catch(err) {
    addLog('오류: ' + err.message);
    console.error(err);
  }
});
</script>
</body>
</html>
